[options]
; Solo addons_path y opciones de UI/dev.
; La conexión a la BD la maneja el entrypoint del contenedor oficial
; leyendo las env vars HOST / PORT / USER / PASSWORD del docker-compose.
addons_path = /mnt/extra-addons
http_port = 8069
admin_passwd = admin123
list_db = True

; Para multi-tenant en producción descomentar:
; list_db = False
; dbfilter = ^%h$
